<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
</head>
<body>

<h2>Edit Student</h2>

<form method="POST">
    {% csrf_token %}

    <label>Name:</label><br>
    <input type="text" name="name" value="{{ student.name }}"><br><br>

    <label>Roll No:</label><br>
    <input type="text" name="rollno" value="{{ student.rollno }}"><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" value="{{ student.email }}"><br><br>

    <label>Phone:</label><br>
    <input type="text" name="phone" value="{{ student.phone }}"><br><br>

    <label>Branch:</label><br>
    <input type="text" name="branch" value="{{ student.branch }}"><br><br>

    <button type="submit">Update</button>
</form>

<br>

<a href="{% url 'student_list' %}">Back to Student List</a>

</body>
</html>
